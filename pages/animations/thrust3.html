<!DOCTYPE html><html><head><meta charset="UTF-8"/>
<style>body,html{margin:0;padding:0;background:#050914;overflow:hidden;}canvas{display:block;width:100%;height:100%;}</style>
</head><body><canvas id="c"></canvas><script>
// Thrust 3 — Active Space Debris Mitigation & Plasma-Based Technologies
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
let W,H,t=0;
function resize(){W=canvas.width=canvas.offsetWidth;H=canvas.height=canvas.offsetHeight;}
window.addEventListener('resize',resize);resize();

function lerp(a,b,t){return a+(b-a)*t;}
function rng(seed){return((Math.sin(seed)*43758.5453)%1+1)%1;}

// Debris pieces
let debris=[];
function initDebris(){
  debris=[];
  for(let i=0;i<28;i++){
    const angle=rng(i*3.1)*Math.PI*2;
    const dist=W*0.24+rng(i*7.3)*W*0.14;
    debris.push({
      id:i,
      x:W*0.38+Math.cos(angle)*dist,
      y:H*0.5+Math.sin(angle)*dist*(0.35+rng(i*2)*0.15),
      vx:(rng(i*11)-0.5)*0.4,
      vy:(rng(i*13)-0.5)*0.15,
      size:1.5+rng(i*5)*4,
      angle:rng(i)*Math.PI*2,
      spin:(rng(i*9)-0.5)*0.03,
      alpha:0.4+rng(i*17)*0.5,
      mitigated:false,
      deorbitProgress:0,
      glowing:0,
    });
  }
}
initDebris();

// Mitigation spacecraft orbit
const scOrbitRx=()=>W*0.18;
const scOrbitRy=()=>H*0.08;
const scX=()=>W*0.38+Math.cos(t*0.25)*scOrbitRx();
const scY=()=>H*0.5+Math.sin(t*0.25)*scOrbitRy();

let plasmaParticles=[];
let mitigationCooldown=0;
let trailPoints=[];

function drawEarth(){
  const x=W*0.38, y=H*0.5, r=Math.min(W,H)*0.15;
  const glow=ctx.createRadialGradient(x,y,r*0.8,x,y,r*1.6);
  glow.addColorStop(0,'rgba(20,80,200,0.12)'); glow.addColorStop(1,'rgba(20,80,200,0)');
  ctx.fillStyle=glow; ctx.beginPath(); ctx.arc(x,y,r*1.6,0,Math.PI*2); ctx.fill();
  const g=ctx.createRadialGradient(x-r*0.3,y-r*0.3,r*0.1,x,y,r);
  g.addColorStop(0,'#2a70c0'); g.addColorStop(0.6,'#144080'); g.addColorStop(1,'#081830');
  ctx.fillStyle=g; ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fill();
  // atmo
  ctx.strokeStyle='rgba(80,160,255,0.15)'; ctx.lineWidth=4;
  ctx.beginPath(); ctx.arc(x,y,r+3,0,Math.PI*2); ctx.stroke();
  ctx.strokeStyle='rgba(60,140,255,0.35)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.stroke();
}

function drawSpacecraft(){
  const x=scX(), y=scY();
  const angle=Math.atan2(Math.sin(t*0.25)*scOrbitRy(),Math.cos(t*0.25)*scOrbitRx());
  ctx.save(); ctx.translate(x,y); ctx.rotate(angle);
  // body
  ctx.fillStyle='#c0c8d8';
  ctx.fillRect(-8,-5,16,10);
  // solar panels
  ctx.fillStyle='rgba(80,120,200,0.8)';
  ctx.fillRect(-18,-2,8,4);
  ctx.fillRect(10,-2,8,4);
  // plasma emitter nozzle
  ctx.fillStyle='rgba(140,180,255,0.9)';
  ctx.beginPath(); ctx.arc(12,0,3,0,Math.PI*2); ctx.fill();
  // operational glow
  const pulse=0.3+0.3*Math.sin(t*2);
  ctx.fillStyle=`rgba(100,160,255,${pulse})`;
  ctx.beginPath(); ctx.arc(12,0,5,0,Math.PI*2); ctx.fill();
  ctx.restore();
  // orbit trail
  trailPoints.push({x,y,alpha:0.6});
  if(trailPoints.length>60)trailPoints.shift();
}

function drawPlasma(){
  const x=scX(), y=scY();
  const angle=Math.atan2(Math.sin(t*0.25)*scOrbitRy(),Math.cos(t*0.25)*scOrbitRx());
  // find nearest non-mitigated debris
  let target=null, minD=W*0.25;
  debris.forEach(d=>{
    if(d.mitigated)return;
    const dx=d.x-x, dy=d.y-y, dist=Math.sqrt(dx*dx+dy*dy);
    if(dist<minD){minD=dist;target=d;}
  });
  if(!target)return;
  const toAngle=Math.atan2(target.y-y,target.x-x);
  // plasma plume
  const firingCycle=Math.sin(t*1.5);
  if(firingCycle>0 && minD<W*0.22){
    const pulseN=Math.floor(t*6)%8;
    for(let i=0;i<3;i++){
      const pct=(i/3+t*3)%1;
      const px=lerp(x,target.x,pct*0.8);
      const py=lerp(y,target.y,pct*0.8);
      const spread=(1-pct)*12;
      const alpha=(1-pct)*0.6*firingCycle;
      ctx.fillStyle=`rgba(120,140,255,${alpha})`;
      ctx.beginPath(); ctx.arc(px+(Math.random()-0.5)*spread,py+(Math.random()-0.5)*spread,2+pct*4,0,Math.PI*2); ctx.fill();
    }
    // pulsing jet line
    const p=0.4+0.4*firingCycle;
    const g=ctx.createLinearGradient(x,y,target.x,target.y);
    g.addColorStop(0,`rgba(140,160,255,${p*0.6})`);
    g.addColorStop(0.6,`rgba(100,120,220,${p*0.3})`);
    g.addColorStop(1,'rgba(100,120,220,0)');
    ctx.strokeStyle=g; ctx.lineWidth=3;
    ctx.beginPath(); ctx.moveTo(x,y); ctx.lineTo(target.x,target.y); ctx.stroke();
    // mark debris as glowing
    target.glowing=Math.min(1,target.glowing+0.04);
    if(target.glowing>0.7 && !target.mitigated){
      target.mitigated=true;
    }
  } else {
    if(target)target.glowing=Math.max(0,target.glowing-0.02);
  }
  // spawn plasma particles
  if(target && firingCycle>0.3 && minD<W*0.22){
    for(let i=0;i<2;i++){
      plasmaParticles.push({
        x:lerp(x,target.x,0.3+Math.random()*0.4),
        y:lerp(y,target.y,0.3+Math.random()*0.4),
        vx:(Math.random()-0.5)*1.5,
        vy:(Math.random()-0.5)*1.5,
        alpha:0.8, size:1.5+Math.random()*2,
        color:`rgba(${100+Math.random()*60|0},${120+Math.random()*60|0},255,`
      });
    }
  }
}

function updateDebris(){
  debris.forEach(d=>{
    if(!d.mitigated){
      d.x+=d.vx; d.y+=d.vy; d.angle+=d.spin;
      // wrap
      if(d.x<0)d.x=W; if(d.x>W)d.x=0;
    } else {
      d.deorbitProgress+=0.002;
      // spiral inward
      const ex=W*0.38, ey=H*0.5;
      d.x=lerp(d.x,ex+Math.cos(d.angle)*Math.max(0,(1-d.deorbitProgress)*80),0.01);
      d.y=lerp(d.y,ey+Math.sin(d.angle)*Math.max(0,(1-d.deorbitProgress)*30),0.01);
      d.alpha=Math.max(0,1-d.deorbitProgress*2);
      d.angle+=0.02;
    }
  });
  debris=debris.filter(d=>d.alpha>0.02);
}

function drawDebris(){
  debris.forEach(d=>{
    ctx.save(); ctx.translate(d.x,d.y); ctx.rotate(d.angle);
    const col=d.glowing>0?`rgba(${180+d.glowing*75|0},${180+d.glowing*20|0},${200+d.glowing*55|0},${d.alpha})`:`rgba(160,165,175,${d.alpha})`;
    ctx.fillStyle=col;
    // irregular shapes
    const s=d.size;
    ctx.beginPath();
    ctx.moveTo(-s,0); ctx.lineTo(-s*0.3,-s*1.2); ctx.lineTo(s*0.8,-s*0.5);
    ctx.lineTo(s,-s*0.1); ctx.lineTo(s*0.4,s); ctx.lineTo(-s*0.5,s*0.7);
    ctx.closePath(); ctx.fill();
    if(d.glowing>0.2){
      ctx.strokeStyle=`rgba(140,160,255,${d.glowing*0.6})`; ctx.lineWidth=0.8;
      ctx.stroke();
    }
    ctx.restore();
    // deorbit trail
    if(d.mitigated && d.deorbitProgress>0){
      ctx.strokeStyle=`rgba(100,180,255,${Math.min(d.alpha,0.3)})`; ctx.lineWidth=0.8;
      ctx.setLineDash([2,4]);
      ctx.beginPath(); ctx.moveTo(d.x,d.y);
      ctx.lineTo(d.x+(W*0.38-d.x)*0.15,d.y+(H*0.5-d.y)*0.15);
      ctx.stroke(); ctx.setLineDash([]);
    }
  });
}

function drawPlasmaParticles(){
  plasmaParticles=plasmaParticles.filter(p=>p.alpha>0.03);
  plasmaParticles.forEach(p=>{
    p.x+=p.vx; p.y+=p.vy; p.alpha-=0.018;
    ctx.fillStyle=p.color+p.alpha+')';
    ctx.beginPath(); ctx.arc(p.x,p.y,p.size,0,Math.PI*2); ctx.fill();
  });
}

function drawOrbitPath(){
  const x=W*0.38, y=H*0.5;
  ctx.strokeStyle='rgba(92,200,255,0.1)'; ctx.lineWidth=0.8;
  ctx.setLineDash([4,6]);
  ctx.beginPath(); ctx.ellipse(x,y,scOrbitRx(),scOrbitRy(),0,0,Math.PI*2); ctx.stroke();
  ctx.setLineDash([]);
}

function drawTrail(){
  trailPoints.forEach((p,i)=>{
    p.alpha-=0.012;
    ctx.fillStyle=`rgba(92,200,255,${Math.max(0,p.alpha)})`;
    ctx.beginPath(); ctx.arc(p.x,p.y,1.2,0,Math.PI*2); ctx.fill();
  });
  trailPoints=trailPoints.filter(p=>p.alpha>0);
}

// Overlay
function drawOverlay(){
  const mitigated=28-debris.length;
  ctx.fillStyle='rgba(92,200,255,0.5)';
  ctx.font=`${Math.max(9,H*0.018)}px monospace`;
  ctx.fillText(`Plasma Mitigation System — Active`,W*0.04,H*0.06);
  ctx.fillStyle='rgba(100,220,120,0.6)';
  ctx.fillText(`Objects mitigated: ${mitigated}`,W*0.04,H*0.1);
}

function frame(){
  t+=0.016;
  ctx.fillStyle='#050914'; ctx.fillRect(0,0,W,H);
  drawEarth();
  drawOrbitPath();
  drawTrail();
  updateDebris();
  drawDebris();
  drawPlasma();
  drawPlasmaParticles();
  drawSpacecraft();
  drawOverlay();
  // respawn if all mitigated
  if(debris.length<4){setTimeout(initDebris,2000);}
  requestAnimationFrame(frame);
}
frame();
</script></body></html>
